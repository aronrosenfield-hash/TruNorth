  This file has zero page chrome. The ENTIRE rendered page IS the
  signature. Open it, ⌘A (select everything), ⌘C (copy), paste into
  Gmail/Mail signature editor. No risk of accidentally copying a
  wrapper div.

  HOW TO REPLACE EXISTING GMAIL SIGNATURE:
    1. Open this file in browser:  open docs/email-signature-clean.html
    2. ⌘A → ⌘C
    3. Gmail → Settings (⚙) → See all settings → General
    4. Scroll to Signature → click your existing "TruNorth" signature
    5. Select all the old content in the editor and DELETE it
    6. ⌘V — paste the clean version
    7. Scroll to bottom → Save Changes
-->
