apply plugin: 'com.android.application'

// ─────────────────────────────────────────────────────────────────────────────
// B-75 — release signing credentials.
//
// Resolution order: android/keystore.properties (gitignored, local dev) then
// environment variables (CI). NOTHING secret is ever written in this file, and
// the keystore itself is covered by the *.jks / *.keystore / keystore.properties
// rules in .gitignore.
//
// ⚠️ The keystore is the one credential you cannot rotate freely — it is bound
// to the Play listing. Back it up to encrypted storage the moment it exists and
// keep the password in a password manager. (If you enroll in Google Play App
// Signing, a lost UPLOAD key can be reset by Google; the app signing key cannot.)
// ─────────────────────────────────────────────────────────────────────────────
def keystorePropsFile = rootProject.file("keystore.properties")
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystorePropsFile.withInputStream { keystoreProps.load(it) }
}
ext.signingValue = { String propKey, String envKey ->
    return keystoreProps.getProperty(propKey) ?: System.getenv(envKey)
}
// Release signing is applied ONLY when credentials resolve, so a fresh clone
// (or CI without secrets) can still run assembleDebug/bundleDebug instead of
// failing on a missing keystore.
def hasSigning = signingValue("storeFile", "ANDROID_KEYSTORE_FILE") != null

android {
    namespace = "com.trunorthapp.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.trunorthapp.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // versionCode is Android-only and must increase on every Play upload;
        // it is independent of the iOS build number. versionName is the
        // user-visible version and should track the product release — it was
        // "1.0" (the `cap add android` scaffold default), which would have
        // shown 1.0 on a listing for the v1.2 app.
        versionCode 1
        versionName "1.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasSigning) {
                storeFile file(signingValue("storeFile", "ANDROID_KEYSTORE_FILE"))
                storePassword signingValue("storePassword", "ANDROID_KEYSTORE_PASSWORD")
                keyAlias signingValue("keyAlias", "ANDROID_KEY_ALIAS")
                keyPassword signingValue("keyPassword", "ANDROID_KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasSigning) {
                signingConfig signingConfigs.release
            } else {
                logger.lifecycle("[trunorth] No signing credentials found — release build will be UNSIGNED. " +
                    "Create android/keystore.properties (see docs/ANDROID_LAUNCH_PLAN.md).")
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
