name: epa-smartway-quarterly

# EPA SmartWay Carrier Partner List — ~3,800 freight partners certified
# under EPA's clean-trucking program. Feeds the environment category for
# logistics-heavy brands (Amazon, FedEx, UPS, Walmart Transport, etc.).
# Quarterly cadence — EPA refreshes the list a few times a year.

on:
  schedule:
    - cron: "27 7 1 1,4,7,10 *"   # 07:00 UTC on Jan/Apr/Jul/Oct 1st
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-pipeline-commit
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch EPA SmartWay carrier list
        run: node scripts/epa-smartway-fetch.mjs

      - name: Merge into augment
        run: node scripts/epa-smartway-merge.mjs

      - name: Run parser tests
        run: node --test scripts/epa-smartway-fetch.test.mjs

      - name: Commit + push
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add data/raw/epa-smartway/ data/derived/epa-smartway-augment.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(epa-smartway): quarterly snapshot + augment refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
