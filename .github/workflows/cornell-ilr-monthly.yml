name: cornell-ilr-monthly

# Cornell ILR Labor Action Tracker — monthly refresh.
#
# Pulls https://striketracker.ilr.cornell.edu/labor_actions.json (a single
# JSON snapshot of every US strike + labor protest + lockout tracked by
# the Cornell ILR School / U. of Illinois LER School academic project),
# normalises each row into per-employer records, and slug-matches against
# the TruNorth brand index.
#
# License: CC-BY — Cornell ILR. Always cite the source URL +
# Kallas, Iyer & Friedman (2024). See scripts/cornell-ilr-fetch.mjs.
#
# Runs the 6th of each month at 06:15 UTC (offset from other crons so
# they don't all dogpile the runner queue). Single HTTP request; wall
# time under 30 seconds.

on:
  schedule:
    - cron: "19 6 6 * *"   # 06:15 UTC on the 6th of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Run Cornell ILR fetcher (live JSON pull)
        run: node scripts/cornell-ilr-fetch.mjs

      - name: Run Cornell ILR merger (slug-match employers)
        run: node scripts/cornell-ilr-merge.mjs

      - name: Run Cornell ILR tests (fixture parser sanity)
        run: node --test scripts/cornell-ilr-fetch.test.mjs

      - name: Open a PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(cornell-ilr): monthly Labor Action Tracker refresh"
          branch: "data/cornell-ilr-${{ github.run_id }}"
          delete-branch: true
          title: "data(cornell-ilr): monthly Labor Action Tracker refresh"
          body: |
            Automated monthly refresh from the Cornell ILR Labor Action
            Tracker (academic strikes / labor protests / lockouts dataset).

            Source: https://striketracker.ilr.cornell.edu
            Data: https://striketracker.ilr.cornell.edu/labor_actions.json
            License: CC-BY — Cornell ILR
            Citation: Kallas, J., Iyer, D. K., & Friedman, E. (2024).
            "Labor Action Tracker." Cornell University ILR School &
            University of Illinois LER School.
          add-paths: |
            data/raw/cornell-ilr/**
            data/derived/cornell-ilr-augment.json
