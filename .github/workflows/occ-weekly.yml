name: occ-weekly

# OCC (Office of the Comptroller of the Currency) enforcement actions
# Runs Tuesday 00:00 UTC. For each brand in top-500-brands.txt, queries
# the OCC EASearch API for institution-level enforcement actions (Civil
# Money Penalties, Cease-and-Desist orders, Formal Agreements, etc).
#
# Free, official US government source — no auth. National-bank coverage:
# JPMorgan Chase, BoA, Wells Fargo, Citi, USAA, etc.

on:
  schedule:
    - cron: "55 0 * * 2"   # Tuesday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit occ-enforcement.json back to main

concurrency:
  group: data-pipeline-commit
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run OCC fetcher
        run: node scripts/occ-fetch.mjs

      - name: Merge enforcement-action data into per-company JSON
        run: node scripts/occ-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/occ-enforcement.json public/data/companies/
          [ -f public/data/_meta/occ-merge-log.json ] && git add public/data/_meta/occ-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(occ): weekly OCC enforcement-action refresh + merge [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
