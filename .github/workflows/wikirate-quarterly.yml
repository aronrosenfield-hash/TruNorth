name: wikirate-quarterly

# WikiRate — Aggregated ESG/labor/climate benchmarks (quarterly)
#
# Runs on the 5th of Jan/Apr/Jul/Oct at 05:30 UTC. Walks a curated list
# of high-signal metrics (Fashion Transparency Index, Clean Clothes
# Campaign Living Wage Gap, KnowTheChain, CDP climate, CHRB, Break Free
# From Plastic), paginates every Answer for each, writes the raw bundle
# to data/raw/wikirate/<date>.json, then slug-matches against our
# 11,209-company index and writes data/derived/wikirate-augment.json.
#
# License: CC BY 4.0 — WikiRate, https://wikirate.org. The script bakes
# the attribution into both output files as the `_license` field.
#
# Courtesy throttle: 1 req/sec. Safety cap: 50,000 answers per run.
# Opens a PR rather than direct-committing so the operator can eyeball
# the quarterly diff before it lands on main.

on:
  schedule:
    - cron: "6 5 5 1,4,7,10 *"   # 05:30 UTC on Jan/Apr/Jul/Oct 5th
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch WikiRate answers (curated metrics, live API)
        env:
          # Optional. Anonymous traffic from non-browser UAs may be 403'd
          # by WikiRate's Cloudflare; set this secret to authenticate.
          WIKIRATE_API_KEY: ${{ secrets.WIKIRATE_API_KEY }}
        run: node scripts/wikirate-fetch.mjs --cache

      - name: Run parser/merger test suite
        run: node --test scripts/wikirate-fetch.test.mjs

      - name: Build wikirate-augment.json (slug-match into TruNorth index)
        run: node scripts/wikirate-merge.mjs

      - name: Show output summary
        run: |
          echo "Raw bundles:"
          ls -lah data/raw/wikirate/ || true
          echo
          echo "Derived augment:"
          ls -lah data/derived/wikirate-augment.json || true
          echo
          echo "License (must be CC BY 4.0):"
          node -e "console.log(require('./data/derived/wikirate-augment.json')._license)"

      - name: Open PR with refreshed data
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/wikirate-${{ github.run_id }}
          base: main
          title: "data(wikirate): quarterly refresh (CC BY 4.0)"
          commit-message: "data(wikirate): quarterly refresh + merge"
          body: |
            Automated quarterly WikiRate refresh.

            License: **CC BY 4.0 — WikiRate, https://wikirate.org**

            Metrics covered:
            - Fashion Transparency Index
            - Transparency Pledge Disclosure Score
            - Clean Clothes Campaign Living Wage Gap
            - KnowTheChain Apparel / ICT / Food & Beverage benchmarks
            - CDP Climate Change Score
            - Corporate Human Rights Benchmark Overall Score
            - Break Free From Plastic Brand Audit

            Generated by `.github/workflows/wikirate-quarterly.yml`.
          add-paths: |
            data/raw/wikirate/
            data/derived/wikirate-augment.json
