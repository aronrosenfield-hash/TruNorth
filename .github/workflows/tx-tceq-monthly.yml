name: tx-tceq-monthly

# R5-3 — Texas Commission on Environmental Quality. Walks the public
# Agreed Orders index monthly for new entries; merges into augment.
# Bulk Compliance History file (300k records) is requested separately
# via comphist@tceq.texas.gov and ingested manually.

on:
  schedule:
    - cron: "40 5 5 * *"   # 05:40 UTC on the 5th of every month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch TX TCEQ (live + kernel)
        run: node scripts/tx-tceq-fetch.mjs --refresh

      - name: Merge into augment
        run: node scripts/tx-tceq-merge.mjs

      - name: Run parser tests
        run: node --test scripts/tx-tceq-fetch.test.mjs

      - name: Commit + push
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add data/raw/tx-tceq/ data/derived/tx-tceq-augment.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(tx-tceq): monthly snapshot + augment refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
