name: ntsb-weekly

# NTSB Accident Reports — National Transportation Safety Board
# Runs Monday 09:00 UTC. For each brand, queries NTSB CAROL for
# accident & incident investigations across aviation, rail, marine,
# and highway modes in a rolling 5-year window.
#
# Free, official US government source — no auth required.

on:
  schedule:
    - cron: "0 9 * * 1"   # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit ntsb-accidents.json back to main

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run NTSB fetcher
        run: node scripts/ntsb-fetch.mjs

      - name: Merge NTSB data into per-company JSON
        run: node scripts/ntsb-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/ntsb-accidents.json public/data/companies/
          [ -f public/data/_meta/ntsb-merge-log.json ] && git add public/data/_meta/ntsb-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(ntsb): weekly NTSB accident refresh + merge [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
