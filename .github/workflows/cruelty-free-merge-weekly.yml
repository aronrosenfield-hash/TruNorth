name: cruelty-free-merge-weekly

# Cruelty-free merge — combines the latest Leaping Bunny + PETA BWB
# snapshots into per-company enriched.cruelty_free. Runs Sunday 03:00 UTC.
#
# Decoupled from the per-source fetchers (which run quarterly) so a weekly
# cadence here picks up any out-of-band manual edits to the override list
# or the brand-parent-map without waiting a full quarter.
#
# Reads:  public/data/_raw/leaping-bunny.json
#         public/data/_raw/peta-bwb.json
# Writes: enriched.cruelty_free into matching public/data/companies/*.json
#         public/data/_meta/cruelty-free-merge-log.json
#         public/data/_meta/cruelty-free-unmatched.json
#
# B-14 — animal-testing flags (cruelty-free certification overlay).

on:
  schedule:
    - cron: "0 3 * * 0"   # Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit per-company JSON + merge log

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run cruelty-free merger
        run: node scripts/cruelty-free-merge.mjs

      - name: Commit + push the merge
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/companies/
          [ -f public/data/_meta/cruelty-free-merge-log.json ] && git add public/data/_meta/cruelty-free-merge-log.json
          [ -f public/data/_meta/cruelty-free-unmatched.json ] && git add public/data/_meta/cruelty-free-unmatched.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(cruelty-free): weekly LB + PETA BWB merge [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
