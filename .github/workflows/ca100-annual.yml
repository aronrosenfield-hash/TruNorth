name: ca100-annual

# Climate Action 100+ — annual mirror of the investor-led initiative's
# ~167 focus-company roster + Net Zero Company Benchmark disclosure
# grades (A-D across the headline indicators: net zero ambition,
# long/medium/short-term targets, decarbonisation strategy, capital
# allocation, climate policy engagement, climate governance, just
# transition, TCFD-aligned disclosure). Runs Dec 1 at 18:00 UTC (the
# benchmark is typically released in late autumn).
#
# Step 1 (ca100-fetch.mjs):
#   - Pings the CA100+ home / companies / benchmark pages (1 req/sec)
#   - Indexes the curated CA100+ mirror (re-verified annually against
#     the Net Zero Company Benchmark release)
#   - Checks top brands against the focus-company roster
#   - Writes public/data/ca100.json
#
# Step 2 (ca100-merge.mjs):
#   - Merges enriched.ca100 {isFocusCompany, disclosureGrade, year,
#     sourceUrl, ...} into each matching company file
#   - Honors slug-aliases + brand-parent-map
#
# Tier 3 governance / environment batch. Free, public data -- no auth
# required. Total runtime ~1-2 minutes.

on:
  schedule:
    - cron: "0 18 1 12 *"   # Dec 1, 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit ca100.json + per-company JSON

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Climate Action 100+ fetcher
        run: node scripts/ca100-fetch.mjs

      - name: Merge Climate Action 100+ data into per-company JSON
        run: node scripts/ca100-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/ca100.json public/data/companies/
          [ -f public/data/_meta/ca100-merge-log.json ] && git add public/data/_meta/ca100-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(ca100): annual Climate Action 100+ refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying…"
            sleep 5
          done
