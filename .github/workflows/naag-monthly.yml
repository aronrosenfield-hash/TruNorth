name: naag-monthly

# NAAG Multistate Settlements Database — one source covering every major
# multistate consumer settlement since the 1980s. Equifax $700M, JUUL,
# Google location-data, $26B+ opioid settlements, etc. Replaces ~50
# individual state-AG sites.
#
# Cadence: monthly (1st @ 05:00 UTC). NAAG doesn't change rapidly.
# Politeness: scripts/naag-fetch.mjs honors a 2-second courtesy delay.
#
# NOTE: NAAG.org sits behind a Kasada bot wall. If the fetcher returns 403
# from the runner's IP, the PR will be empty — re-run after a human has
# investigated whether NAAG has lifted the wall or whether we need to add a
# documented data-pull workaround (e.g., scheduled headless-browser job).

on:
  schedule:
    - cron: "0 5 1 * *"   # 05:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests (parser invariants)
        run: node --test scripts/naag-fetch.test.mjs

      - name: Fetch NAAG settlements (live)
        run: node scripts/naag-fetch.mjs

      - name: Build derived augment
        run: node scripts/naag-merge.mjs

      - name: Open PR if derived changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(naag): monthly multistate settlements refresh"
          title: "data(naag): monthly multistate settlements refresh"
          body: |
            Automated NAAG Multistate Settlements Database refresh.

            - Raw:       `data/raw/naag/<date>.json`
            - Derived:   `data/derived/naag-augment.json`
            - Unmatched: `data/derived/naag-unmatched.json`

            Source: https://www.naag.org/our-work/multistate-cases/
            License: Public, NAAG.org.
          branch: data/naag
          add-paths: |
            data/raw/naag/**
            data/derived/naag-augment.json
            data/derived/naag-unmatched.json
          delete-branch: true
