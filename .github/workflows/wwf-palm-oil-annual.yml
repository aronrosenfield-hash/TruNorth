name: wwf-palm-oil-annual

# WWF Sustainable Palm Oil Buyer Scorecard — ~285 large global palm-oil
# buyers scored 0-24 on commitments, sourcing, traceability, supplier
# accountability. Source: https://palmoilscorecard.panda.org
#
# Cadence: annual (WWF publishes every 1-2 years). We run quarterly so a
# new release or methodology revision is picked up promptly.

on:
  schedule:
    - cron: "21 7 20 1,4,7,10 *"   # 07:00 UTC on the 20th of Jan/Apr/Jul/Oct
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch WWF Palm Oil Scorecard (live)
        run: node scripts/wwf-palm-oil-fetch.mjs --apply

      - name: Build augment
        run: node scripts/wwf-palm-oil-merge.mjs

      - name: Tests
        run: node --test scripts/wwf-palm-oil-fetch.test.mjs

      - name: Open PR if derived changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(wwf-palm-oil): annual scorecard refresh"
          title: "data(wwf-palm-oil): annual refresh"
          body: |
            Automated WWF Sustainable Palm Oil Buyer Scorecard refresh.

            Source: https://palmoilscorecard.panda.org

            - Raw: `data/raw/wwf-palm-oil/`
            - Derived: `data/derived/wwf-palm-oil-augment.json`
          branch: data/wwf-palm-oil
          add-paths: |
            data/raw/wwf-palm-oil/**
            data/derived/wwf-palm-oil-augment.json
          delete-branch: true
