name: cpuc-quarterly

# R5-2 — California Public Utilities Commission enforcement. Quarterly
# kernel refresh + live news-list walk for new citation headlines.

on:
  schedule:
    - cron: "30 5 4 1,4,7,10 *"   # 05:30 UTC on the 4th of Jan/Apr/Jul/Oct
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch CPUC (live + kernel)
        run: node scripts/cpuc-fetch.mjs --refresh

      - name: Merge into augment
        run: node scripts/cpuc-merge.mjs

      - name: Run parser tests
        run: node --test scripts/cpuc-fetch.test.mjs

      - name: Commit + push
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add data/raw/cpuc/ data/derived/cpuc-augment.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(cpuc): quarterly snapshot + augment refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
