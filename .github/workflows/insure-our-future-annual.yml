name: insure-our-future-annual

# Insure Our Future climate scorecard — 30 global re/insurers ranked annually
# on coal, oil & gas underwriting + investment policies.
# Cadence: annual (Nov 1, the scorecard typically drops in late October).
# Source: https://global.insure-our-future.com/scorecard/

on:
  schedule:
    - cron: "47 8 1 11 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run fetcher tests
        run: node --test scripts/insure-our-future-fetch.test.mjs

      - name: Fetch Insure Our Future scorecard
        run: node scripts/insure-our-future-fetch.mjs

      - name: Build derived augment
        run: node scripts/insure-our-future-merge.mjs

      - name: Open PR if derived changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(insure-our-future): annual scorecard refresh"
          title: "data(insure-our-future): annual scorecard refresh"
          body: |
            Automated Insure Our Future scorecard refresh.

            - Raw:       `data/raw/insure-our-future/<date>.json`
            - Derived:   `data/derived/insure-our-future-augment.json`
            - Parked:    `data/derived/insure-our-future-parked.json`

            Source: https://global.insure-our-future.com/scorecard/
            License: public records.
          branch: data/insure-our-future
          add-paths: |
            data/raw/insure-our-future/**
            data/derived/insure-our-future-augment.json
            data/derived/insure-our-future-parked.json
          delete-branch: true
