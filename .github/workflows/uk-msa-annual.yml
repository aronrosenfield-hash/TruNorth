name: uk-msa-annual

# UK Modern Slavery Act Registry — annual mirror of the public
# statement registry hosted by the UK Home Office at
# https://modern-slavery-statement-registry.service.gov.uk
#
# Step 1 (uk-msa-fetch.mjs):
#   - Queries the registry's /search/statements page once per brand
#     (1 req/sec, UA "TruNorth-UK-MSA/1.0")
#   - Parses statement-summary cards and extracts the latest year +
#     registry permalink for each matched company
#   - Writes public/data/uk-msa.json
#
# Step 2 (uk-msa-merge.mjs):
#   - Merges enriched.ukMsa {hasStatement, statementCount,
#     latestStatementYear, statementUrl, ...} into each matching
#     company file
#   - Honors slug-aliases + brand-parent-map
#
# Annual cadence (Mar 1 19:00 UTC) — UK MSA statements are typically
# published within 6 months of fiscal-year-end; running in early March
# captures the bulk of prior-year filings.

on:
  schedule:
    - cron: "25 19 1 3 *"   # Mar 1, 19:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit uk-msa.json + per-company JSON

concurrency:
  group: data-pipeline-commit
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run UK MSA fetcher
        run: node scripts/uk-msa-fetch.mjs

      - name: Merge UK MSA data into per-company JSON
        run: node scripts/uk-msa-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/uk-msa.json public/data/companies/
          [ -f public/data/_meta/uk-msa-merge-log.json ] && git add public/data/_meta/uk-msa-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(uk-msa): annual UK Modern Slavery Act registry refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
