name: tosdr-monthly

# ToS;DR terms-of-service privacy grades (CC BY-SA 3.0, grades-only with
# attribution — license verified 2026-06-11). ~25 API pages at 1 req/s.

on:
  schedule:
    - cron: "40 7 6 * *" # 06th monthly, 07:40 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-pipeline-commit
  cancel-in-progress: false

jobs:
  fetch-and-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --omit=dev
      - name: Fetch ToS;DR ratings
        run: node scripts/tosdr-fetch.mjs
      - name: Merge into catalog
        run: node scripts/tosdr-merge.mjs
      - name: Rebake + finalize
        run: |
          node scripts/rebake-scoring.mjs
          node scripts/finalize-bundle.mjs
      - name: Commit
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data
          git diff --cached --quiet || git commit -m "data(tosdr): monthly ToS;DR privacy-grade refresh [skip ci]"
          git pull --rebase origin main
          git push origin main
