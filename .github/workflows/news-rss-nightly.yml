name: news-rss-nightly

# Option A — Google News RSS collector
# Runs nightly at 04:00 UTC. Pulls 30-day RSS for each brand in
# /public/data/top-500-brands.txt, filters to high-signal articles via
# keyword match + outlet whitelist, annotates AllSides bias rating per
# domain, writes /public/data/news/YYYY-MM-DD.json.
#
# AI extraction (using Anthropic API) is a separate downstream step that
# only runs on the high-signal subset to keep cost down.

on:
  schedule:
    - cron: "48 4 * * *"    # daily 04:00 UTC
  workflow_dispatch:        # allow manual runs

# Serialize overlapping triggers (manual dispatch landing on top of a still-
# running cron, repeated workflow_dispatch from cleanup tasks, etc.). We saw
# 8 cancellations in 14 runs before this lock landed — `cancel-in-progress:
# false` queues newcomers instead of killing the in-flight job, which is the
# correct behavior for a data-collection workflow that writes commits.
concurrency:
  group: news-rss-nightly
  cancel-in-progress: false

permissions:
  contents: write   # required to commit the digest back to main

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # QA 2026-06-10: this job hit its 60-min kill 8 nights straight (hung
      # sockets — no fetch timeouts) and the commit step never ran, so an
      # hour of collection was discarded nightly. The scripts now carry
      # per-request timeouts + a 35-min collector budget, and the commit
      # step runs even when an upstream step fails, so partial digests land.
      - name: Run news collector
        run: node scripts/news-rss-collect.mjs

      - name: Run AI extraction on high-signal items
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/news-rss-extract.mjs

      - name: Merge extracted signals into per-company JSON
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: node scripts/news-extracted-merge.mjs

      - name: Commit + push the digest
        if: ${{ !cancelled() }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          # Stage everything under the news + companies dirs in one shot;
          # -A tolerates missing files (merge-log.json may not exist on a
          # zero-merge night). This was the second half of the 2026-06-03
          # outage — git add of a literal nonexistent path failed the step
          # before the data/news files could be committed.
          git add -A public/data/news/ public/data/companies/
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(news): nightly RSS digest + AI extraction + per-company merge $DATE [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying…"
            sleep 5
          done
