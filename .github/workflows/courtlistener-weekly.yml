name: courtlistener-weekly

# Option C — CourtListener.com lawsuit fetcher
# Runs Sunday 17:00 UTC. For each brand, queries CourtListener's free
# search API for federal/state cases where the brand is a party. Captures
# case counts, types breakdown, 5 most-recent cases. Overwrites
# /public/data/lawsuits.json.

on:
  schedule:
    - cron: "21 17 * * 0"   # Sunday 17:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit lawsuits.json back to main

concurrency:
  group: data-pipeline-commit
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run CourtListener fetcher
        run: node scripts/courtlistener-fetch.mjs

      - name: Merge lawsuit data into per-company JSON
        run: node scripts/lawsuits-merge.mjs

      - name: Commit + push the lawsuit data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add -A public/data/lawsuits.json public/data/companies/ public/data/_meta/
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(lawsuits): weekly CourtListener refresh + per-company merge [skip ci]"
          # 5 retries with jittered backoff — courtlistener-weekly raced
          # another bot push on 2026-06-02 and dropped its commit. A short
          # 3-try loop wasn't enough; bumping to 5 with 10–40s jitter so
          # parallel bot workflows have time to land.
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            sleep $((RANDOM % 30 + 10))
            echo "Push attempt $i failed, retrying…"
          done
          echo "All push attempts exhausted"
          exit 1
