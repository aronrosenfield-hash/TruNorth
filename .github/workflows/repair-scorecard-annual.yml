name: repair-scorecard-annual

# PIRG Failing the Fix + iFixit repairability — annual refresh.
#
# PIRG publishes the "Failing the Fix" scorecard each spring (Feb-Apr).
# iFixit refreshes their per-device repairability rankings continuously,
# but the manufacturer-rollup signal is stable enough for annual cadence.
#
# Note: both PIRG and iFixit are protected by Cloudflare bot challenges,
# so the fetcher uses a curated corpus that maintainers update from the
# published reports. Run is fast (no network calls during fetch); the
# cron just rebuilds the augment so any source-file edits land cleanly.
#
# Reviewer: when PIRG releases a new edition, update PIRG_<year> in
# scripts/repair-scorecard-fetch.mjs and tag a release. Same for iFixit.

on:
  schedule:
    - cron: "16 15 1 5 *"   # May 1, 15:00 UTC (well after PIRG release)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run repair-scorecard tests
        run: node --test scripts/repair-scorecard-fetch.test.mjs

      - name: Run repair-scorecard fetcher
        run: node scripts/repair-scorecard-fetch.mjs --apply

      - name: Run repair-scorecard merger
        run: node scripts/repair-scorecard-merge.mjs

      - name: Open a PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(repair-scorecard): annual PIRG + iFixit refresh"
          branch: "data/repair-scorecard-${{ github.run_id }}"
          delete-branch: true
          title: "data(repair-scorecard): annual PIRG + iFixit refresh"
          body: |
            Automated annual refresh of the right-to-repair scorecard
            (PIRG Failing the Fix + iFixit smartphone repairability).

            Sources:
              - https://pirg.org/edfund/resources/failing-the-fix/
              - https://www.ifixit.com/smartphone-repairability

            License: public-record scorecard; cited per row.
          add-paths: |
            data/raw/repair-scorecard/**
            data/derived/repair-scorecard-augment.json
