name: iihs-tsp-annual

# IIHS Top Safety Pick / TSP+ annual award lists.
#
# Scrapes https://www.iihs.org/ratings/top-safety-picks/<YYYY> for each
# calendar year 2020..(current), normalises the per-vehicle award rows
# (make, model, year, TSP vs TSP+), and merges into data/derived per
# TruNorth automaker slug.
#
# IIHS publishes the next year's TSP/TSP+ list each spring (late Feb /
# early March) and continues to retroactively promote vehicles to TSP+
# as headlight evaluations conclude through the year. Running once in
# mid-March captures the bulk; manual workflow_dispatch picks up later
# retroactive additions.
#
# Runs the 15th of March at 06:00 UTC. 2 sec courtesy delay between
# requests; total wall time <2 min (7 year pages).

on:
  schedule:
    - cron: "0 6 15 3 *"   # 06:00 UTC on March 15
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps (cheerio is bundled in node_modules)
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Run IIHS TSP fetcher (live scrape, all years 2020..current)
        run: node scripts/iihs-tsp-fetch.mjs

      - name: Run IIHS TSP merger
        run: node scripts/iihs-tsp-merge.mjs

      - name: Run IIHS TSP tests (fixture parser sanity)
        run: node --test scripts/iihs-tsp-fetch.test.mjs

      - name: Open a PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(iihs-tsp): annual TSP / TSP+ award-list refresh"
          branch: "data/iihs-tsp-${{ github.run_id }}"
          delete-branch: true
          title: "data(iihs-tsp): annual IIHS Top Safety Pick refresh"
          body: |
            Automated annual refresh from the IIHS Top Safety Pick / TSP+
            award lists (2020..current).

            Source: https://www.iihs.org/ratings/top-safety-picks
            License: Public IIHS award list — attributed per record
          add-paths: |
            data/raw/iihs-tsp/**
            data/derived/iihs-tsp-augment.json
