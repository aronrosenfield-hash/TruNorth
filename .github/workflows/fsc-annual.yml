name: fsc-annual

# Forest Stewardship Council (FSC) — annual mirror of FSC-certified
# consumer brands (paper, tissue, lumber, packaging, furniture) plus
# per-brand categories, since-year, and source URL. Runs Apr 1 at
# 18:00 UTC.
#
# Step 1 (fsc-fetch.mjs):
#   - Pings FSC's public portal + certificate search + marketplace
#     (1 req/sec)
#   - Indexes the curated FSC mirror (re-verified annually against the
#     certificate database + trademark portal + FSC Connect news)
#   - Checks top brands against the index
#   - Writes public/data/fsc.json
#
# Step 2 (fsc-merge.mjs):
#   - Merges enriched.fsc {isFscCertified, fscCategories, sinceYear,
#     sourceUrl, ...} into each matching company file
#   - Honors slug-aliases + brand-parent-map
#
# Tier 3 certifications batch. Free, public data — no auth required.
# Total runtime ~1-2 minutes.

on:
  schedule:
    - cron: "51 18 1 4 *"   # Apr 1, 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit fsc.json + per-company JSON

concurrency:
  group: data-pipeline-commit
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run FSC fetcher
        run: node scripts/fsc-fetch.mjs

      - name: Merge FSC data into per-company JSON
        run: node scripts/fsc-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/fsc.json public/data/companies/
          [ -f public/data/_meta/fsc-merge-log.json ] && git add public/data/_meta/fsc-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(fsc): annual Forest Stewardship Council certification refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying…"
            sleep 5
          done
