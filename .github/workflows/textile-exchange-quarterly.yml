name: textile-exchange-quarterly

# Textile Exchange — Standards bundle (RCS/GRS/RWS/RDS/RMS), quarterly.
#
# One source, five apparel-relevant certifications:
#   - RCS  Recycled Claim Standard       (% recycled input)
#   - GRS  Global Recycled Standard      (RCS + social/environmental)
#   - RWS  Responsible Wool Standard     (animal welfare for wool)
#   - RDS  Responsible Down Standard     (animal welfare for down)
#   - RMS  Responsible Mohair Standard   (animal welfare for mohair)
#
# Runs on the 12th of Jan/Apr/Jul/Oct at 06:00 UTC.
#
# Step 1 (textile-exchange-fetch.mjs):
#   - Pings the public standards landing pages @ 1 req/sec
#   - Emits the curated certified-brand mirror (re-verified quarterly
#     against the brand finder + Material Change Insights report)
#   - Writes data/raw/textile-exchange/<YYYY-MM-DD>.json
#
# Step 2 (textile-exchange-merge.mjs):
#   - Slug-matches each row against apparel parents in public/data/index.json
#   - Writes data/derived/textile-exchange-augment.json keyed by slug
#
# License: public certification registry (textileexchange.org/standards/).
# Opens a PR so the operator can eyeball the quarterly diff before merge.

on:
  schedule:
    - cron: "11 6 12 1,4,7,10 *"   # 06:00 UTC on Jan/Apr/Jul/Oct 12th
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch Textile Exchange certified brands (live ping + mirror)
        run: node scripts/textile-exchange-fetch.mjs

      - name: Run parser/merger test suite
        run: node --test scripts/textile-exchange-fetch.test.mjs

      - name: Build textile-exchange-augment.json (slug-match into TruNorth apparel parents)
        run: node scripts/textile-exchange-merge.mjs

      - name: Show output summary
        run: |
          echo "Raw bundles:"
          ls -lah data/raw/textile-exchange/ || true
          echo
          echo "Derived augment:"
          ls -lah data/derived/textile-exchange-augment.json || true
          echo
          echo "Cert types covered:"
          node -e "console.log(require('./data/raw/textile-exchange/' + require('fs').readdirSync('./data/raw/textile-exchange').sort().pop()).cert_types.join(', '))"

      - name: Open PR with refreshed data
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/textile-exchange-${{ github.run_id }}
          base: main
          title: "data(textile-exchange): quarterly RCS/GRS/RWS/RDS/RMS refresh"
          commit-message: "data(textile-exchange): quarterly refresh + merge"
          body: |
            Automated quarterly Textile Exchange refresh.

            Source: https://textileexchange.org/standards/
            License: Public certification registry — Textile Exchange.

            Standards covered (one source, five categories of signal):
            - RCS  Recycled Claim Standard
            - GRS  Global Recycled Standard
            - RWS  Responsible Wool Standard
            - RDS  Responsible Down Standard
            - RMS  Responsible Mohair Standard

            Generated by `.github/workflows/textile-exchange-quarterly.yml`.
          add-paths: |
            data/raw/textile-exchange/
            data/derived/textile-exchange-augment.json
