name: powerbase-quarterly

# Powerbase (Spinwatch) wiki refresh — quarterly.
#
# Source: https://powerbase.info — UK-based investigative wiki on PR firms,
# lobbying networks, corporate front groups, revolving-door appointments.
# We hit the MediaWiki action API at ≤1 req/sec with a real User-Agent.
#
# Schedule: 1st of Jan/Apr/Jul/Oct at 06:00 UTC. Wiki edits are slow so
# quarterly is plenty; this also keeps the .cache/powerbase/ directory hot.
#
# License: CC BY-SA 3.0 — Powerbase (Spinwatch).

on:
  schedule:
    - cron: "39 6 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch Powerbase wiki pages (seed brands + top 500)
        run: node scripts/powerbase-fetch.mjs --limit 500 --cache

      - name: Run parser/merger test suite
        run: node --test scripts/powerbase-fetch.test.mjs

      - name: Build augment (slug-match into TruNorth index)
        run: node scripts/powerbase-merge.mjs

      - name: Show output summary
        run: |
          echo "Raw bundle:"
          ls -lah data/raw/powerbase/ || true
          echo
          echo "Derived augment:"
          ls -lah data/derived/powerbase-augment.json || true
          echo
          echo "License:"
          node -e "console.log(require('./data/derived/powerbase-augment.json')._license)"

      - name: Open PR with refreshed data
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/powerbase-${{ github.run_id }}
          base: main
          title: "data(powerbase): quarterly refresh (CC BY-SA 3.0)"
          commit-message: "data(powerbase): quarterly refresh + merge"
          body: |
            Automated quarterly Powerbase (Spinwatch) refresh.

            License: **CC BY-SA 3.0 — Powerbase, https://powerbase.info**

            Editorial wiki coverage of PR firms, front groups, lobbying
            networks, and revolving-door relationships. Severity is gated
            conservatively: "poor" only when ≥2 external citations are
            present alongside negative-keyword cues.

            Generated by `.github/workflows/powerbase-quarterly.yml`.
          add-paths: |
            data/raw/powerbase/
            data/derived/powerbase-augment.json
