name: oecd-ncp-monthly

# OECD National Contact Points specific instances — case database.
# Curated corpus refreshes monthly (OECD Watch publishes new cases continuously
# but updates roll into the public database in monthly batches).
# Sources:
#   - https://mneguidelines.oecd.org/database/
#   - https://www.oecdwatch.org/complaints-database/

on:
  schedule:
    - cron: "22 7 5 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run fetcher tests
        run: node --test scripts/oecd-ncp-fetch.test.mjs

      - name: Fetch OECD NCP corpus
        run: node scripts/oecd-ncp-fetch.mjs

      - name: Build derived augment
        run: node scripts/oecd-ncp-merge.mjs

      - name: Open PR if derived changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(oecd-ncp): monthly OECD NCP specific-instances refresh"
          title: "data(oecd-ncp): monthly OECD NCP specific-instances refresh"
          body: |
            Automated OECD National Contact Points refresh.

            - Raw:       `data/raw/oecd-ncp/<date>.json`
            - Derived:   `data/derived/oecd-ncp-augment.json`
            - Orphans:   `data/derived/oecd-ncp-unmatched.json`

            Sources:
              - https://mneguidelines.oecd.org/database/
              - https://www.oecdwatch.org/complaints-database/
            License: public records.
          branch: data/oecd-ncp
          add-paths: |
            data/raw/oecd-ncp/**
            data/derived/oecd-ncp-augment.json
            data/derived/oecd-ncp-unmatched.json
          delete-branch: true
