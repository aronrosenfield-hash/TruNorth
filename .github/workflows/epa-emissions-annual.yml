name: epa-emissions-annual

# EPA GHGRP (Greenhouse Gas Reporting Program) + TRI (Toxics Release
# Inventory) annual data pull. EPA releases the prior reporting year
# in March, so we run Apr 1 to be safe.
#
# Both sources are large public CSVs (~hundreds of MB combined). We cache
# the per-year CSVs in public/data/_cache/ and the merge step streams
# them line-by-line to aggregate facility data to parent companies.
#
# Output: enriched.environment.ghg_* + tri_* fields on the per-company JSON
# files under public/data/companies/.

on:
  schedule:
    - cron: "0 6 1 4 *"     # Apr 1 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip live EPA downloads + write to dry-run log instead of per-company files"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  fetch-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "fetch_flag=--dry"  >> "$GITHUB_OUTPUT"
            echo "merge_flag=--dry"  >> "$GITHUB_OUTPUT"
          else
            echo "fetch_flag=--live"  >> "$GITHUB_OUTPUT"
            echo "merge_flag=--apply" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch GHGRP CSVs
        run: node scripts/epa-ghgrp-fetch.mjs ${{ steps.mode.outputs.fetch_flag }} --years 4

      - name: Fetch TRI CSVs
        run: node scripts/epa-tri-fetch.mjs ${{ steps.mode.outputs.fetch_flag }} --years 4

      - name: Merge into per-company JSON
        run: node scripts/epa-emissions-merge.mjs ${{ steps.mode.outputs.merge_flag }}

      - name: Commit + push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/companies/
          [ -f public/data/_meta/epa-emissions-merge-log.json ] && git add public/data/_meta/epa-emissions-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(epa-emissions): annual GHGRP + TRI refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying…"
            sleep 5
          done
