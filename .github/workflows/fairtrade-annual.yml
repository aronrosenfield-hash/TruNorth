name: fairtrade-annual

# Fair Trade USA — annual mirror of the certified-brand directory + per-
# brand categories, since-year, and source URL. Runs Jan 1 at 18:00 UTC.
#
# Step 1 (fairtrade-fetch.mjs):
#   - Pings the FTUSA public portal + products listing (1 req/sec)
#   - Indexes the curated FTUSA mirror (re-verified annually against the
#     directory + press releases + annual impact reports)
#   - Checks 528 top brands against the index
#   - Writes public/data/fairtrade.json
#
# Step 2 (fairtrade-merge.mjs):
#   - Merges enriched.fairTrade {isFairTradeCertified, fairTradeCategories,
#     sinceYear, sourceUrl, ...} into each matching company file
#   - Honors slug-aliases + brand-parent-map
#
# Tier 3 certifications batch. Free, public data — no auth required.
# Total runtime ~1-2 minutes.

on:
  schedule:
    - cron: "0 18 1 1 *"   # Jan 1, 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit fairtrade.json + per-company JSON

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Fair Trade USA fetcher
        run: node scripts/fairtrade-fetch.mjs

      - name: Merge Fair Trade data into per-company JSON
        run: node scripts/fairtrade-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/fairtrade.json public/data/companies/
          [ -f public/data/_meta/fairtrade-merge-log.json ] && git add public/data/_meta/fairtrade-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(fairtrade): annual Fair Trade USA certification refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying…"
            sleep 5
          done
