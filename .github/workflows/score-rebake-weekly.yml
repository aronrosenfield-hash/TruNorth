name: score-rebake-weekly

# B-23 — Weekly scoring rebake.
# Sundays at 16:00 UTC, which is 2 hours after the Sunday news-extract digest
# (news-rss-nightly runs 04:00 UTC daily; we leave a buffer so the latest
# recent_events[] is in place before we re-derive overlays).
#
# Reads each /public/data/companies/<slug>.json's recent_events[] in the
# last 90 days, derives a SIDECAR scoring_overlay.<category> = { delta, ... }
# (and events_agg for categorical categories), and commits the change.
#
# Sidecar approach — sc.* baselines are never mutated. To revert a bad
# rebake: `git revert` the commit, or strip co.scoring_overlay/events_agg/
# excl_stale by hand. The runtime's applyOverlay() in src/App.jsx is the
# only consumer; absence of the sidecar leaves grades at baseline.

on:
  schedule:
    - cron: "20 16 * * 0"   # Sundays 16:00 UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

concurrency:
  group: data-pipeline-commit
  cancel-in-progress: false

jobs:
  rebake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # B-64: without this the first bare import (finalize-bundle.mjs → minisearch)
      # dies with ERR_MODULE_NOT_FOUND and the whole rebake hard-fails in <25s.
      - name: Install deps
        run: npm ci

      - name: Dry-run (always — prints summary even if --apply fails)
        run: node scripts/rebake-scores-from-events.mjs

      - name: Apply rebake (writes sidecar to per-company JSON)
        run: node scripts/rebake-scores-from-events.mjs --apply

      # R6 Lever 1 (2026-06-10): propagate refreshed parent data to
      # sub-brand catalog entries ("Via parent company X" cells), then
      # recompute realCats/overall and the index so inherited grades ship.
      - name: Parent-inheritance refresh
        run: node scripts/inherit-from-parent.mjs --apply

      - name: Rebake scoring + finalize bundle
        run: |
          node scripts/rebake-scoring.mjs --apply
          node scripts/finalize-bundle.mjs

      # Diff the grades we just recomputed against last week's snapshot and
      # rebuild weekly_changes.json (the "what changed this week" retention
      # loop + Sunday digest source). Runs here, after index.json is fresh,
      # so the changes commit atomically with the grades that caused them.
      - name: Compute weekly changes
        run: node scripts/compute-weekly-changes.mjs --apply

      - name: Commit + push
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          # 2026-07-20 (v1.2 review): this staged only companies/ + weekly_changes
          # + grade-snapshot, but finalize-bundle.mjs ALSO rewrites index.json and
          # search-index.json. Those stayed unstaged, so the tree was never clean,
          # every `git pull --rebase` aborted, and because the loop's last command
          # was `sleep 5` the job still exited 0 — five weeks of grade movement and
          # the entire Sunday digest died silently while reporting green.
          # Stage the whole data dir, and fail LOUDLY if the push never lands.
          git add public/data/ || true
          git diff --quiet --staged && echo "No changes to rebake — exiting" && exit 0
          git commit -m "data(rebake): weekly scoring overlay refresh $DATE [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying…"
            sleep 5
          done
          echo "::error::rebake push failed after 3 attempts — grades did NOT ship" >&2
          exit 1

      # B-81 — "we'll email you the moment <brand> is graded" had ZERO consumers
      # anywhere in scripts/, api/ or .github/workflows/. This step consumes the
      # `new_brand` rows the step above just produced (a brand crossing "?" → A-F
      # is absent from last week's graded-only snapshot, so it already shows up
      # as newly graded) and reports exactly who is waiting on each one.
      #
      # DRY RUN ON PURPOSE — it sends nothing. Email is irreversible and
      # outward-facing, so the recipient set gets proven in the logs for a few
      # weeks before anyone flips this to --apply. `|| true` keeps a reporting
      # step from ever failing the data job.
      - name: Notify-me dry run (newly graded brands)
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
        run: node scripts/notify-newly-graded.mjs || true
