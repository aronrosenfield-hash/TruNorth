name: awa-quarterly

# Animal Welfare Approved (A Greener World) certified farms — quarterly.
#
# Scrapes https://agreenerworld.org/programs/certified-animal-welfare-approved/
# (the AWA directory) once a quarter, then merges into a per-slug augment
# file keyed by TruNorth company slug.
#
# Source license: Public certification list (A Greener World); we cite the
# source URL per row in the derived file.
#
# Throttle: 2 sec courtesy delay; total wall time <30 sec.

on:
  schedule:
    - cron: "0 7 2 1,4,7,10 *"   # 07:00 UTC on the 2nd of Jan/Apr/Jul/Oct
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run AWA fixture tests
        run: node --test scripts/awa-fetch.test.mjs

      - name: Run AWA fetcher (live scrape)
        run: node scripts/awa-fetch.mjs

      - name: Run AWA merger
        run: node scripts/awa-merge.mjs

      - name: Open a PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(awa): quarterly Animal Welfare Approved refresh"
          branch: "data/awa-${{ github.run_id }}"
          delete-branch: true
          title: "data(awa): quarterly Animal Welfare Approved refresh"
          body: |
            Automated quarterly refresh of the Animal Welfare Approved
            (A Greener World) certified-farm directory.

            Source: https://agreenerworld.org/programs/certified-animal-welfare-approved/
            License: Public certification list; cited per row.
          add-paths: |
            data/raw/awa/**
            data/derived/awa-augment.json
