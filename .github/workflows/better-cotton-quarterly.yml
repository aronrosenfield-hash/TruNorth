name: better-cotton-quarterly

# Better Cotton Initiative — Retailer & Brand Members (DW-57).
#
# Scrapes https://bettercotton.org/who-we-are/members/ (~hundreds of
# retailer/brand members) once a quarter, then merges into a derived
# per-slug augment file keyed by TruNorth company slug.
#
# Source license: Public membership directory; we cite the source URL in
# the derived file and on the per-company detail card.
#
# Throttle: 2 sec courtesy delay; total wall time <30 sec.

on:
  schedule:
    - cron: "6 6 2 1,4,7,10 *"   # 06:00 UTC on the 2nd of Jan/Apr/Jul/Oct
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Better Cotton fixture tests
        run: node --test scripts/better-cotton-fetch.test.mjs

      - name: Run Better Cotton fetcher (live scrape)
        run: node scripts/better-cotton-fetch.mjs

      - name: Run Better Cotton merger
        run: node scripts/better-cotton-merge.mjs

      - name: Open a PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(better-cotton): quarterly member refresh"
          branch: "data/better-cotton-${{ github.run_id }}"
          delete-branch: true
          title: "data(better-cotton): quarterly Better Cotton member refresh"
          body: |
            Automated quarterly refresh of Better Cotton Initiative
            corporate members.

            Source: https://bettercotton.org/who-we-are/members/
            License: Public membership directory; source cited per row.
          add-paths: |
            data/raw/better-cotton/**
            data/derived/better-cotton-augment.json
