name: dea-monthly

# DEA Diversion Control — administrative actions against registrants
# (pharmacies, distributors, manufacturers). Runs on the 1st of each month
# at 21:00 UTC. Source is the Federal Register API, restricted to the DEA.
#
# Free, official US-government API — no auth required.

on:
  schedule:
    - cron: "0 21 1 * *"   # 1st of month, 21:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit dea-actions.json back to main

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run DEA fetcher
        run: node scripts/dea-fetch.mjs

      - name: Merge DEA actions into per-company JSON
        run: node scripts/dea-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/dea-actions.json public/data/companies/
          [ -f public/data/_meta/dea-merge-log.json ] && git add public/data/_meta/dea-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(dea): monthly DEA Diversion admin-action refresh + merge [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying…"
            sleep 5
          done
