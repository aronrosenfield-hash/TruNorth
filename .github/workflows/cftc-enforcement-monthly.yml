name: cftc-enforcement-monthly

# DW-14 — CFTC enforcement actions, monthly refresh.
#
# Runs on the 3rd of each month at 06:30 UTC. Reads either the
# bundled fixture (default) or a remote OpenSanctions JSON mirror
# configured via the CFTC_OS_URL secret.

on:
  schedule:
    - cron: "30 6 3 * *"
  workflow_dispatch:
    inputs:
      url:
        description: "Optional override URL (CSV or OpenSanctions JSON)"
        required: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch CFTC enforcement
        env:
          CFTC_OS_API_KEY: ${{ secrets.CFTC_OS_API_KEY }}
        run: |
          URL="${{ github.event.inputs.url || secrets.CFTC_OS_URL }}"
          if [ -n "$URL" ]; then
            node scripts/cftc-enforcement-fetch.mjs --apply --url "$URL"
          else
            node scripts/cftc-enforcement-fetch.mjs
          fi

      - name: Merge into derived augment
        run: node scripts/cftc-enforcement-merge.mjs

      - name: Run tests
        run: node --test scripts/cftc-enforcement-fetch.test.mjs

      - name: Commit + push
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add data/raw/cftc-enforcement/ data/derived/cftc-enforcement-augment.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(cftc-enforcement): monthly refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
