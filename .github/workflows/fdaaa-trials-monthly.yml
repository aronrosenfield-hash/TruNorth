name: fdaaa-trials-monthly

# FDAAA TrialsTracker — clinical-trial reporting compliance (monthly)
#
# Pulls ~5,000 industry pharma sponsors' compliance with FDAAA 801
# (US law requiring trial results to be reported within 12 months of
# completion) from fdaaa.trialstracker.net, then merges per TruNorth slug.
#
# Source:  https://fdaaa.trialstracker.net
# License: Apache-2.0 (see ebmdatalab/clinicaltrials-act-tracker on GitHub)
#
# Runs the 6th of each month at 06:15 UTC (offset from other crons).
# Wall time: <3 min (3 CSV downloads, no per-row API calls).

on:
  schedule:
    - cron: "56 6 6 * *"   # 06:15 UTC on the 6th of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Run FDAAA TrialsTracker fixture tests
        run: node --test scripts/fdaaa-trials-fetch.test.mjs

      - name: Run FDAAA TrialsTracker fetcher (live)
        run: node scripts/fdaaa-trials-fetch.mjs

      - name: Run FDAAA TrialsTracker merger
        run: node scripts/fdaaa-trials-merge.mjs

      - name: Open a PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(fdaaa-trials): monthly clinical-trial compliance refresh"
          branch: "data/fdaaa-trials-${{ github.run_id }}"
          delete-branch: true
          title: "data(fdaaa-trials): monthly FDAAA TrialsTracker refresh"
          body: |
            Automated monthly refresh from the FDAAA TrialsTracker
            (Bennett Institute / DataLab, University of Oxford).

            Per-sponsor compliance with FDAAA 801: number of trials due,
            number reported, percentage on-time. Rolled up to TruNorth
            pharma parent brands.

            Source: https://fdaaa.trialstracker.net
            License: Apache-2.0
          add-paths: |
            data/raw/fdaaa-trials/**
            data/derived/fdaaa-trials-augment.json
