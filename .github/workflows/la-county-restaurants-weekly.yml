name: la-county-restaurants-weekly

# LA County (City of LA) restaurant health inspections — weekly refresh.
#
# Source: City of Los Angeles "Restaurant and Market Health Inspections"
# https://data.lacity.org/Community-Economic-Development/Restaurant-and-Market-Health-Inspections/29fd-3paw
# Socrata API; anonymous reads are fine but a free X-App-Token raises the
# rate ceiling — set LA_SOCRATA_APP_TOKEN as a repo secret if available.
#
# Schedule: Monday 04:15 UTC. The dataset itself does not refresh weekly
# (it is a historical archive last updated 2018-07), but weekly cadence
# keeps the data pipeline alive so when the City re-opens posting we'll
# capture the next snapshot automatically. License: public domain.

on:
  schedule:
    - cron: "12 4 * * 1"   # Mondays 04:15 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch LA City Socrata inspections (full)
        env:
          LA_SOCRATA_APP_TOKEN: ${{ secrets.LA_SOCRATA_APP_TOKEN }}
        run: node scripts/la-county-restaurants-fetch.mjs --apply

      - name: Run parser/merger test suite
        run: node --test scripts/la-county-restaurants-fetch.test.mjs

      - name: Build augment (slug-match into TruNorth index)
        run: node scripts/la-county-restaurants-merge.mjs

      - name: Show output summary
        run: |
          echo "Raw bundle:"
          ls -lah data/raw/la-county-restaurants/ || true
          echo
          echo "Derived augment:"
          ls -lah data/derived/la-county-restaurants-augment.json || true
          echo
          echo "License:"
          node -e "console.log(require('./data/derived/la-county-restaurants-augment.json')._license)"

      - name: Open PR with refreshed data
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/la-county-restaurants-${{ github.run_id }}
          base: main
          title: "data(la-county-restaurants): weekly refresh (public domain)"
          commit-message: "data(la-county-restaurants): weekly refresh + merge"
          body: |
            Automated weekly LA City restaurant-inspections refresh.

            License: **City of Los Angeles open data (public domain)**

            Outlet-level A/B/C grades for LA chain restaurants.

            Generated by `.github/workflows/la-county-restaurants-weekly.yml`.
          add-paths: |
            data/raw/la-county-restaurants/
            data/derived/la-county-restaurants-augment.json
