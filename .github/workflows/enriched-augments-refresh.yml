name: enriched-augments-refresh

# Refreshes the Build-76 "public-record footprint" sources and folds them into
# per-company JSON. Runs in clean CI (no local parallel-session contention) and
# carries the DOL_API_KEY secret so the labor-wages source can pull DOL WHISARD
# wage-theft data. apply-enriched-augments.mjs is format-preserving, so the
# company-file diff is just the added enriched.* fields — not a reformat.
#
# Sources folded in: sec-tax · supply-chain · openfda-recalls · privacy ·
# pharma-conduct · labor-wages (WARN + WHISARD) · animal-certs.
# (EPA emissions, ITEP, Fed-Reserve apply via their own workflows.)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (apply locally in CI but do not commit)"
        default: "false"
  schedule:
    - cron: "17 9 * * 1" # weekly, Monday 09:17 UTC

permissions:
  contents: write

concurrency:
  group: enriched-augments
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Each fetcher writes data/derived/<src>-augment.json. Best-effort: a
      # transient source failure leaves the committed augment in place (the
      # fetchers self-guard against writing an empty/short augment), so the
      # apply step still runs with the last good data.
      - name: Refresh source augments
        env:
          DOL_API_KEY: ${{ secrets.DOL_API_KEY }}
        run: |
          node scripts/sec-tax-fetch.mjs --apply         || echo "::warning::sec-tax refresh skipped"
          node scripts/supply-chain-fetch.mjs --apply    || echo "::warning::supply-chain refresh skipped"
          node scripts/openfda-recalls-fetch.mjs --apply || echo "::warning::openfda refresh skipped"
          node scripts/privacy-enforcement-fetch.mjs --apply || echo "::warning::privacy refresh skipped"
          node scripts/pharma-conduct-fetch.mjs --apply  || echo "::warning::pharma refresh skipped"
          node scripts/animal-certs-fetch.mjs --apply    || echo "::warning::animal-certs refresh skipped"
          node scripts/labor-wages-fetch.mjs --apply     || echo "::warning::labor-wages refresh skipped"

      - name: Apply enriched augments → per-company JSON
        run: node scripts/apply-enriched-augments.mjs --apply

      - name: Commit + push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/companies/ data/derived/
          if git diff --quiet --staged; then echo "No changes"; exit 0; fi
          git commit -m "data(enriched): refresh footprint sources (7 + WHISARD) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying…"; sleep 5
          done
