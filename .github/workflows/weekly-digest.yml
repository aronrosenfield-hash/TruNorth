# Phase 5.as — Sunday weekly digest.
#
# Sends one MailerLite campaign every Sunday at 18:00 UTC (~1pm ET, 10am PT)
# summarizing the week's grade changes + new recalls from
# public/data/weekly_changes.json.
#
# TIMING IS LOAD-BEARING: weekly_changes.json is rebuilt by
# score-rebake-weekly.yml at 16:20 UTC Sunday (its compute-weekly-changes
# step). This digest runs at 18:00 UTC — ~1h40m later — so it always emails
# the grades that rebake just recomputed. Do not move it earlier than the
# rebake, or it will send last week's (or empty) data.
#
# Repo secrets required:
#   MAILERLITE_API_KEY     — MailerLite API token (Subscribers + Campaigns scope)
#   MAILERLITE_GROUP_ID    — group of digest subscribers (see lib/marketing.js)
#
# Manual run also enabled — useful for "send a fresh digest today" or testing
# with DRY_RUN=true (renders the HTML to build/digest-preview.html, no send).

name: weekly-digest

on:
  schedule:
    - cron: "0 18 * * 0"    # Sunday 18:00 UTC (after score-rebake-weekly @ 16:20)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (render only, no send)"
        required: false
        default: "false"

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Send weekly digest
        env:
          MAILERLITE_API_KEY:  ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
          APP_URL:             "https://trunorthapp.com"
          DRY_RUN:             ${{ inputs.dry_run }}
        run: node scripts/send-weekly-digest.mjs

      - name: Upload preview (dry-run only)
        if: ${{ inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-preview
          path: build/digest-preview.html
          if-no-files-found: warn
