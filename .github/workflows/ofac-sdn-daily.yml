name: ofac-sdn-daily

# DW-7 — OFAC SDN sanctions list. Treasury republishes the full sdn.csv
# whenever a listing changes (typically a few times per week). We snapshot
# at 03:30 UTC daily and let the merger diff against the previous augment.

on:
  schedule:
    - cron: "5 3 * * *"   # 03:30 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-pipeline-commit
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch OFAC SDN
        run: node scripts/ofac-sdn-fetch.mjs

      - name: Merge into augment
        run: node scripts/ofac-sdn-merge.mjs

      - name: Run parser tests
        run: node --test scripts/ofac-sdn-fetch.test.mjs

      - name: Commit + push
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add data/raw/ofac-sdn/ data/derived/ofac-sdn-augment.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(ofac-sdn): daily snapshot + augment refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
