name: dol-whd-monthly

# DOL WHD (Wage and Hour Division) wage-theft enforcement data.
#
# Downloads the WHISARD bulk dataset, aggregates per-brand totals
# (cases / back wages owed / employees affected / top violation types
# over the last 5 years), and merges the result into per-company JSON
# under enriched.dolWhd.
#
# Runs on the 1st of each month at 06:00 UTC.

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC, day 1 of every month
  workflow_dispatch:

permissions:
  contents: write   # required to commit dol-whd.json + companies/ back to main

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure unzip is available
        run: which unzip || sudo apt-get install -y unzip

      - name: Run DOL WHD fetcher
        run: node scripts/dol-whd-fetch.mjs

      - name: Merge DOL WHD data into per-company JSON
        run: node scripts/dol-whd-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/dol-whd.json public/data/companies/
          [ -f public/data/_meta/dol-whd-merge-log.json ] && git add public/data/_meta/dol-whd-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(dol-whd): monthly DOL WHD wage-theft enforcement refresh + merge [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying…"
            sleep 5
          done
