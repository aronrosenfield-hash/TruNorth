name: eu-transparency-monthly

# EU Transparency Register — monthly fetch + merge.
#
# Downloads the full EU Transparency Register bulk JSON dump, filters to
# companies + trade/business associations, matches against TruNorth's brand
# index, and writes data/derived/eu-transparency-augment.json. Opens a PR.
#
# Free re-use of the dataset is permitted under the EU PSI Directive
# (© European Union, attribution required — see fetcher source comment).
#
# Runs on the 8th of each month at 05:00 UTC (giving the EU site a week
# after the typical end-of-month refresh to settle). Total wall time is
# dominated by a single ~20MB download.

on:
  schedule:
    - cron: "0 5 8 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run unit tests (no network)
        run: node --test scripts/eu-transparency-fetch.test.mjs

      - name: Fetch EU Transparency Register bulk dump (live)
        run: node scripts/eu-transparency-fetch.mjs --live

      - name: Merge into TruNorth augment file
        run: node scripts/eu-transparency-merge.mjs --apply

      - name: Open PR with refreshed data
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: data/eu-transparency-${{ github.run_number }}
          base: main
          commit-message: "data(eu-transparency): monthly EU lobbying register refresh"
          title: "data(eu-transparency): monthly EU lobbying register refresh"
          body: |
            Auto-generated by `.github/workflows/eu-transparency-monthly.yml`.

            Refreshes `data/raw/eu-transparency/<date>.json` and re-merges
            `data/derived/eu-transparency-augment.json` against the
            11k-entry TruNorth brand index.

            License: EU PSI Directive — © European Union, 2026.
          add-paths: |
            data/raw/eu-transparency/**
            data/derived/eu-transparency-augment.json
          delete-branch: true
