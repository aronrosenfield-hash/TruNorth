name: wikirate-monthly

# WikiRate — Crowdsourced ESG metrics aggregator
# Runs the 1st of each month at 14:30 UTC. For each brand, fetches WikiRate
# answers (metric, value, year, source) and merges per-company aggregates.
#
# Free, public, no auth — courtesy rate-limited at 1 req/sec.

on:
  schedule:
    - cron: "30 14 1 * *"   # 1st of month, 14:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run WikiRate fetcher
        env:
          WIKIRATE_API_KEY: ${{ secrets.WIKIRATE_API_KEY }}
        run: node scripts/wikirate-fetch.mjs

      - name: Merge WikiRate metrics into per-company JSON
        run: node scripts/wikirate-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/wikirate-metrics.json public/data/companies/
          [ -f public/data/_meta/wikirate-merge-log.json ] && git add public/data/_meta/wikirate-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(wikirate): monthly WikiRate ESG metrics refresh + merge [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
