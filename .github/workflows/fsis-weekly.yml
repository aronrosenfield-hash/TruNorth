name: fsis-weekly

# FSIS — USDA Food Safety and Inspection Service Recall API
# Runs Monday 04:00 UTC. Downloads the full FSIS recall dump once
# (~1200 unique English records), then locally substring-matches each
# of the 528 brands in top-500-brands.txt against field_establishment
# to attach per-brand aggregates.
#
# Free, official USDA API — no auth, no rate-limit issues. Akamai may
# 403 from some IPs; GitHub Actions runners are typically fine.

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # required to commit fsis-recalls.json + per-company files

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run FSIS fetcher
        run: node scripts/fsis-fetch.mjs

      - name: Merge recall data into per-company JSON
        run: node scripts/fsis-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/fsis-recalls.json public/data/companies/
          [ -f public/data/_meta/fsis-merge-log.json ] && git add public/data/_meta/fsis-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(fsis): weekly FSIS recall refresh + merge [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
