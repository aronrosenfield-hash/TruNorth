name: cdc-foodnet-monthly

# CDC Foodborne Outbreak (FoodNet/NORS) — per-brand outbreak match
# Runs monthly on the 1st at 02:00 UTC. CDC's outbreak list updates slowly,
# so monthly cadence is plenty.

on:
  schedule:
    - cron: "0 2 1 * *"   # 02:00 UTC on the first of each month
  workflow_dispatch:

permissions:
  contents: write   # required to commit data back to main

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run CDC FoodNet fetcher
        run: node scripts/cdc-foodnet-fetch.mjs

      - name: Merge outbreak data into per-company JSON
        run: node scripts/cdc-foodnet-merge.mjs

      - name: Commit + push the data
        run: |
          git config user.name "trunorth-bot"
          git config user.email "bot@trunorthapp.com"
          git add public/data/cdc-foodnet-outbreaks.json public/data/companies/
          [ -f public/data/_meta/cdc-foodnet-merge-log.json ] && git add public/data/_meta/cdc-foodnet-merge-log.json
          git diff --quiet --staged && echo "No changes" && exit 0
          git commit -m "data(cdc-foodnet): monthly outbreak refresh + merge [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying…"
            sleep 5
          done
